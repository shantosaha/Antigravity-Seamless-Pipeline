    - { id: 2E, skill: devops-infra-coder }
    - { id: 2F, skill: algorithm-engineer }
    - { id: 2G, skill: ai-feature-builder }
    - { id: 2H, skill: cli-scripting-engineer }
    - { id: 2I, skill: realtime-systems-engineer }
    - { id: 2J, skill: integration-glue-engineer }
  layer_3:
