    - { id: P2, skill: project-planner }
    - { id: P3, skill: prerequisite-scanner }
    - { id: P4, skill: dependency-solver }
    - { id: P5, skill: skeleton-generator }
    - { id: P6, skill: context-memory-manager }
    - { id: P7, skill: risk-detector }
    - { id: P8, skill: task-decomposer }
  layer_1:
    - { id: "1", skill: architect }
