version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: antigravity-redis
    ports:
      - "6379:6379"
    volumes:
      - antigravity-redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: antigravity-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - antigravity-qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: antigravity-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: antigravity
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: antigravity_password
    volumes:
      - antigravity-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antigravity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  antigravity-redis-data:
  antigravity-qdrant-data:
  antigravity-postgres-data:
