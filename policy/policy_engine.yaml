# Policy Engine Configuration

global_policies:
  - name: "no_harmful_content"
    priority: critical
    action: block
    
  - name: "respect_rate_limits"
    priority: high
    action: throttle
    
  - name: "prefer_cached_results"
    priority: medium
    action: optimize
    
  - name: "data_privacy"
    priority: critical
    action: enforce

project_policies: []

enforcement:
  strict_mode: true
  log_violations: true
  alert_on_critical: true
