# Antigravity Agent Configuration
name: "antigravity-agent"
version: "1.0.0"
base_model: "claude-sonnet-4-20250514"
context_budget: 190000
default_temperature: 0.7

global_config_path: "${HOME}/.antigravity/global.yaml"
project_config_path: "./config.yaml"

# Capabilities
capabilities:
  - code_generation
  - document_creation
  - data_analysis
  - workflow_orchestration

# Limits
limits:
  max_retries: 3
  timeout_seconds: 300
  max_parallel_tasks: 5
